name: CI
on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.group }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
        group:
          - core
          - universalities
          - models/classical
          - models/quantum/TFIM
          - models/quantum/XXZ
          - models/quantum/Heisenberg
          - models/quantum/KitaevHoneycomb
          - models/quantum/misc
          - identities
          - verification/tightbinding
          - verification/tfim_ising
          - verification/heisenberg_xxz
          - verification/universality
    env:
      QATLAS_TEST_GROUP: ${{ matrix.group }}
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: x64
      - uses: julia-actions/cache@v3
        with:
          cache-name: ${{ matrix.group }}
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          julia-args: "--threads=auto"
      - uses: julia-actions/julia-processcoverage@v1
      - name: Compute artifact name
        id: art
        run: |
          name="coverage-${{ matrix.group }}"
          name="${name//[\/,]/_}"
          echo "name=$name" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.art.outputs.name }}
          path: lcov.info
          retention-days: 1
          if-no-files-found: error

  coverage:
    name: Coverage (aggregated)
    runs-on: ubuntu-latest
    needs: test
    if: always() && needs.test.result != 'cancelled'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: coverage-parts
          pattern: coverage-*
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: Merge per-group lcov reports
        run: |
          set -euo pipefail
          mapfile -t files < <(find coverage-parts -name 'lcov.info' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No coverage artifacts found"
            exit 1
          fi
          echo "Merging ${#files[@]} lcov reports:"
          printf '  %s\n' "${files[@]}"
          args=()
          for f in "${files[@]}"; do
            args+=(-a "$f")
          done
          lcov "${args[@]}" -o lcov.info
          summary=$(lcov --summary lcov.info)
          echo ""
          echo "=== Merged coverage summary ==="
          echo "$summary"
          {
            echo "## Merged coverage summary"
            echo "(merged from ${#files[@]} matrix-job artifacts)"
            echo ""
            echo '```'
            echo "$summary"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: codecov/codecov-action@v6
        with:
          file: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  all-tests:
    name: All tests passed
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check all matrix jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more test groups failed: ${{ needs.test.result }}"
            exit 1
          fi
