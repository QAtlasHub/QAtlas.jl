name: CI
on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.group }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
        group:
          - core,universalities
          - models/classical
          - models/quantum/TFIM
          - models/quantum/XXZ,models/quantum/Heisenberg,models/quantum/KitaevHoneycomb,models/quantum/misc
          - identities
          - verification/tightbinding
          - verification/tfim_ising
          - verification/heisenberg_xxz
          - verification/universality
    env:
      QATLAS_TEST_GROUP: ${{ matrix.group }}
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: x64
      - uses: julia-actions/cache@v3
        with:
          cache-name: ${{ matrix.group }}
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          julia-args: "--threads=auto"
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          file: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.group }}
          fail_ci_if_error: false

  all-tests:
    name: All tests passed
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check all matrix jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more test groups failed: ${{ needs.test.result }}"
            exit 1
          fi
